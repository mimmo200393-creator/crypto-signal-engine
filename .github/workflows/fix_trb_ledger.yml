name: Fix TRB Ledger (una tantum)

# Workflow MANUALE: non gira da solo, lo lanci tu dal tab "Actions".
# Serve a riparare gli outcome storici di TRB nel Decision Ledger, che il
# bug della mappa in trb_integration.py aveva registrato tutti come EXPIRED.
#
# COME SI USA:
#   1. Vai su GitHub → tab "Actions"
#   2. Nella lista a sinistra scegli "Fix TRB Ledger (una tantum)"
#   3. Bottone "Run workflow" a destra
#   4. Lascia "dry_run = true" la prima volta → guarda l'output senza rischi
#   5. Rilancia con "dry_run = false" per applicare davvero
#
# Quando applica, committa il decision_ledger.db corretto e le dashboard
# rigenerate. Dopo che ha funzionato, puoi cancellare questo file.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Solo simulazione (true) o applica davvero (false)?"
        type: boolean
        default: true

permissions:
  contents: write

# STESSO GRUPPO DELLO SCAN: i .db sono file binari e git non sa fonderli.
# Se questo workflow e scan.yml girano insieme, il secondo che committa
# trova il repo cambiato e va in conflitto irrisolvibile (successo davvero:
# "CONFLICT (content): Merge conflict in data/decision_ledger.db").
# Con lo stesso group, questo workflow ASPETTA che lo scan finisca.
concurrency:
  group: signal-engine-scan
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt --break-system-packages || pip install -r requirements.txt

      - name: Stato PRIMA della fix
        run: |
          python3 - <<'EOF'
          import sqlite3
          c = sqlite3.connect("data/decision_ledger.db")
          print("=== TRB nel Ledger PRIMA ===")
          for r in c.execute("""SELECT outcome, COUNT(*) FROM decision_ledger
                                WHERE strategy='TRB' GROUP BY outcome"""):
              print(f"  {r[0]}: {r[1]}")
          EOF

      - name: Esegui la fix (dry-run o apply)
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo ">>> MODALITA' DRY-RUN: nessuna modifica verra' scritta"
            python3 fix_trb_ledger_outcomes.py
          else
            echo ">>> MODALITA' APPLY: le correzioni verranno scritte"
            python3 fix_trb_ledger_outcomes.py --apply
          fi

      - name: Stato DOPO la fix
        if: ${{ inputs.dry_run == false }}
        run: |
          python3 - <<'EOF'
          import sqlite3
          c = sqlite3.connect("data/decision_ledger.db")
          print("=== TRB nel Ledger DOPO ===")
          for r in c.execute("""SELECT outcome, COUNT(*) FROM decision_ledger
                                WHERE strategy='TRB' GROUP BY outcome"""):
              print(f"  {r[0]}: {r[1]}")
          print("\n=== Altre strategie (devono essere invariate) ===")
          for r in c.execute("""SELECT strategy, COUNT(*) FROM decision_ledger
                                WHERE strategy!='TRB' GROUP BY strategy"""):
              print(f"  {r[0]}: {r[1]}")
          EOF

      - name: Commit del Ledger corretto
        if: ${{ inputs.dry_run == false }}
        run: |
          git config user.name "signal-engine-bot"
          git config user.email "actions@github.com"

          # I file .backup_* creati dallo script NON vanno committati.
          rm -f data/decision_ledger.db.backup_* || true

          # Rigenera le dashboard cosi' TRB compare subito.
          python3 generate_unified_dashboard.py || true
          python3 generate_analytics_dashboard.py || true
          python3 generate_engine_edge_dashboard.py || true

          git add data/decision_ledger.db \
                  docs/unified_dashboard.html \
                  docs/analytics_dashboard.html \
                  docs/engine_edge_dashboard.html

          if git diff --staged --quiet; then
            echo "Nessuna modifica da committare."
          else
            git commit -m "Fix outcome storici TRB nel Decision Ledger"

            # I .db sono binari: se lo scan ha committato nel frattempo, il
            # rebase va in conflitto. In quel caso NON si tenta il merge (non
            # ha senso su un binario): si riparte dalla versione remota, si
            # riapplica la fix e si ripusha. La fix e' idempotente, quindi
            # rifarla su dati gia' corretti non fa danni.
            if git pull --rebase origin main; then
              git push
              echo "Ledger corretto e pushato."
            else
              echo "Conflitto sul rebase (lo scan ha committato nel frattempo)."
              echo "Riparto dalla versione remota e riapplico la fix..."
              git rebase --abort || true
              git fetch origin main
              git reset --hard origin/main
              python3 fix_trb_ledger_outcomes.py --apply
              rm -f data/decision_ledger.db.backup_* || true
              python3 generate_unified_dashboard.py || true
              python3 generate_analytics_dashboard.py || true
              python3 generate_engine_edge_dashboard.py || true
              git add data/decision_ledger.db \
                      docs/unified_dashboard.html \
                      docs/analytics_dashboard.html \
                      docs/engine_edge_dashboard.html
              git commit -m "Fix outcome storici TRB nel Decision Ledger (retry)"
              git push
              echo "Ledger corretto e pushato al secondo tentativo."
            fi
          fi
