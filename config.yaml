STRATEGY_NAME: "Pullback EMA Trend Strategy"
STRATEGY_VERSION: "V1.0"

# Risk / scoring
ATR_MULTIPLIER: 1.5
MIN_RR: 2.0
DB_SCORE_THRESHOLD: 8
TELEGRAM_SCORE_THRESHOLD: 9

# Anti-spam / lifecycle
COOLDOWN_HOURS: 12
TRADE_EXPIRY_BARS: 72

# Scan
SCAN_INTERVAL_MINUTES: 15

# Pivot detection
PIVOT_LOOKBACK: 5

# Exchange / data
EXCHANGE_BASE_URL: "https://api.crypto.com/exchange/v1"
MAX_CANDLES_PER_CALL: 300          # confermato: count=300 restituisce >126 candele in una chiamata, non limitato a 50
REQUEST_DELAY_SECONDS: 0.75
BOOTSTRAP_TARGET_CANDLES: 300

# Telegram
# NON inserire qui token/chat_id se questo file viene committato su GitHub.
# Vengono letti da variabili d'ambiente TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID
# (impostate come GitHub Secrets). Vedi main.py -> load_config().
TELEGRAM_BOT_TOKEN: ""
TELEGRAM_CHAT_ID: ""
DISCORD_WEBHOOK_URL: ""
NTFY_TOPIC: ""

# Macro
MACRO_EVENTS_FILE: "macro_events.yaml"
MACRO_WINDOW_MINUTES: 60

# Database
DB_PATH: "data/signals.db"
LOG_FILE: "logs/engine.log"

WATCHLIST:
  - BTC_USDT
  - ETH_USDT
  - ADA_USDT
  - SOL_USDT
  - LINK_USDT
  - XRP_USDT
  - DOGE_USDT
  - LTC_USDT
  - DOT_USDT
  - ZEC_USDT
  - FIL_USDT
  - SHIB_USDT
  - BCH_USDT
  - WIF_USDT
  - XLM_USDT

TIMEFRAMES:
  H4: "4h"
  H1: "1h"

EMA_PERIODS: [21, 50, 100, 200]
ATR_PERIOD: 14
