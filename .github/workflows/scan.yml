name: Crypto Signal Engine V2.1 - Scan

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      send_test_alert:
        description: "Invia alert di TEST con dati finti (non fa scan)"
        type: boolean
        default: false
      test_low_threshold:
        description: "Scan reale con soglia Final Score abbassata a 5 (test pipeline)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: signal-engine-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt --break-system-packages || pip install -r requirements.txt

      - name: Run scan cycle
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SEND_TEST_ALERT: ${{ github.event.inputs.send_test_alert }}
          TELEGRAM_SCORE_THRESHOLD_OVERRIDE: ${{ github.event.inputs.test_low_threshold == 'true' && '5' || '' }}
        run: python3 main.py

      - name: Commit database e log
        run: |
          git config user.name "signal-engine-bot"
          git config user.email "actions@github.com"
          git add data/signals.db logs/engine.log
          git diff --staged --quiet || git commit -m "Scan V2.1 $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push

      - name: Daily Brief (08:00 UTC)
        if: ${{ github.event_name == 'schedule' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          if [ "$HOUR" = "08" ] && [ "$MINUTE" -lt "20" ]; then
            python3 -c "
import os, yaml
from storage import db
from core import daily_brief
config = yaml.safe_load(open('config.yaml'))
config['TELEGRAM_BOT_TOKEN'] = os.environ.get('TELEGRAM_BOT_TOKEN','')
config['TELEGRAM_CHAT_ID'] = os.environ.get('TELEGRAM_CHAT_ID','')
config['NTFY_TOPIC'] = os.environ.get('NTFY_TOPIC','')
conn = db.get_connection(config['DB_PATH'])
db.init_db(conn)
daily_brief.send_daily_brief(conn, config)
"
          fi

      - name: Generate dashboard
        run: python3 generate_dashboard.py

      - name: Commit dashboard
        run: |
          git config user.name "signal-engine-bot"
          git config user.email "actions@github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Dashboard $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push
